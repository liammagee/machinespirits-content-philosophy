# Content Package Manifest
# Updated: 2026-05-13

name: "@machinespirits/content-philosophy"
version: "2.0.0"
platform: "^1.0.0"

# Site Identity
site:
  name: "Machine Spirits"
  tagline: "Philosophy for machines that learn."
  description: |
    A research program rethinking AI through Hegelian recognition,
    Freudian/Hayles nonconscious cognition, Weberian charisma, and
    Heideggerian temporal orientation — paired with a working AI tutor,
    evaluation probes, and pedagogy at UIUC. Critique and construction,
    in public.
  url: "https://machinespirits.org"
  author: "Liam Magee"
  institution: "University of Illinois Urbana-Champaign"

# Branding
branding:
  logo: "./assets/logo.svg"
  favicon: "./assets/favicon.svg"
  colors: "./theme/colors.yaml"
  fonts: "./theme/fonts.yaml"

# Content Sources
content:
  courses: "./courses"
  articles: "./articles"
  assets: "./assets"

# Configuration
navigation: "./config/navigation.yaml"
features: "./config/features.yaml"

# Tutor Customization
tutor:
  prompts: "./prompts"
  defaultProfile: "experimental"
