<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Audit Playground</title>
  <meta name="artifact-title" content="Design Audit Playground">
  <meta name="artifact-description" content="Interactive explorer for the Machine Spirits design system — colours, typography, and spacing tokens.">
  <meta name="artifact-tags" content="design, tokens, typography, colour">
  <meta name="artifact-author" content="Machine Spirits">
  <meta name="artifact-date" content="2026-03-14">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E63946;
      --red-dark: #c1121f;
      --black: #0a0a0a;
      --white: #ffffff;
      --off-white: #fafafa;
      --grid: 8px;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--off-white);
      color: var(--black);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }

    h1 span { color: var(--red); }

    .subtitle {
      font-size: 14px;
      opacity: 0.5;
      margin-bottom: 48px;
    }

    h2 {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--black);
      padding-bottom: 8px;
      margin-bottom: 24px;
      margin-top: 48px;
    }

    /* Colour palette */
    .palette {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .swatch {
      border: 2px solid var(--black);
      overflow: hidden;
    }

    .swatch-color {
      height: 80px;
      position: relative;
    }

    .swatch-info {
      padding: 12px;
      background: var(--white);
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .swatch-name {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .swatch-hex {
      opacity: 0.6;
    }

    .swatch-var {
      font-size: 10px;
      opacity: 0.4;
      margin-top: 2px;
    }

    /* Typography */
    .type-sample {
      border: 2px solid var(--black);
      margin-bottom: 16px;
      display: flex;
    }

    .type-label {
      width: 180px;
      flex-shrink: 0;
      padding: 16px;
      background: var(--black);
      color: var(--white);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .type-label .weight {
      opacity: 0.5;
    }

    .type-preview {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      background: var(--white);
      overflow: hidden;
    }

    /* Spacing */
    .spacing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px;
    }

    .spacing-token {
      border: 2px solid var(--black);
      padding: 16px;
      background: var(--white);
      text-align: center;
    }

    .spacing-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      margin-bottom: 12px;
    }

    .spacing-bar {
      background: var(--red);
      height: 100%;
    }

    .spacing-value {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 700;
    }

    .spacing-name {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Contrast checker */
    .contrast-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      border: 2px solid var(--black);
      overflow: hidden;
    }

    .contrast-cell {
      padding: 16px 12px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
    }

    .contrast-cell.header {
      background: var(--black);
      color: var(--white);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .contrast-ratio {
      font-size: 14px;
      display: block;
      margin-bottom: 2px;
    }

    .pass { color: #16a34a; }
    .fail { color: var(--red); }

    @media (max-width: 600px) {
      .type-sample { flex-direction: column; }
      .type-label { width: 100%; }
      .contrast-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Machine Spirits / Design System</div>
    <h1>DESIGN AUDIT <span>PLAYGROUND</span></h1>
    <p class="subtitle">Interactive explorer for colours, typography, and spacing tokens.</p>

    <h2>Colour Palette</h2>
    <div class="palette" id="palette"></div>

    <h2>Typography</h2>
    <div id="typography"></div>

    <h2>Spacing Scale (base: 8px)</h2>
    <div class="spacing-grid" id="spacing"></div>

    <h2>Contrast Matrix</h2>
    <div class="contrast-grid" id="contrast"></div>
  </div>

  <script>
    // Colour definitions
    const colours = [
      { name: 'Red', hex: '#E63946', variable: '--red' },
      { name: 'Red Dark', hex: '#c1121f', variable: '--red-dark' },
      { name: 'Black', hex: '#0a0a0a', variable: '--black' },
      { name: 'White', hex: '#ffffff', variable: '--white' },
      { name: 'Off-White', hex: '#fafafa', variable: '--off-white' },
    ];

    // Render palette
    const paletteEl = document.getElementById('palette');
    colours.forEach(col => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.innerHTML = `
        <div class="swatch-color" style="background:${col.hex}"></div>
        <div class="swatch-info">
          <div class="swatch-name">${col.name}</div>
          <div class="swatch-hex">${col.hex}</div>
          <div class="swatch-var">var(${col.variable})</div>
        </div>
      `;
      // Copy hex on click
      swatch.style.cursor = 'pointer';
      swatch.addEventListener('click', () => {
        navigator.clipboard.writeText(col.hex).then(() => {
          swatch.querySelector('.swatch-hex').textContent = 'Copied!';
          setTimeout(() => {
            swatch.querySelector('.swatch-hex').textContent = col.hex;
          }, 1200);
        });
      });
      paletteEl.appendChild(swatch);
    });

    // Typography samples
    const typographyEl = document.getElementById('typography');
    const typeSpecs = [
      { name: 'Space Mono', family: "'Courier New', monospace", weight: '400 / 700', sizes: [36, 24, 16, 13, 11] },
      { name: 'Helvetica Neue', family: "'Helvetica Neue', Helvetica, Arial, sans-serif", weight: '400 / 700', sizes: [36, 24, 16, 13, 11] },
    ];

    typeSpecs.forEach(spec => {
      spec.sizes.forEach(size => {
        const sample = document.createElement('div');
        sample.className = 'type-sample';
        sample.innerHTML = `
          <div class="type-label">
            <span>${spec.name}</span>
            <span class="weight">${size}px / ${spec.weight}</span>
          </div>
          <div class="type-preview" style="font-family:${spec.family}; font-size:${size}px;">
            Machine Spirits Aa Bb Cc 0123
          </div>
        `;
        typographyEl.appendChild(sample);
      });
    });

    // Spacing scale
    const spacingEl = document.getElementById('spacing');
    const spacingSteps = [
      { name: '1x', value: 8 },
      { name: '2x', value: 16 },
      { name: '3x', value: 24 },
      { name: '4x', value: 32 },
      { name: '6x', value: 48 },
      { name: '8x', value: 64 },
      { name: '12x', value: 96 },
    ];

    spacingSteps.forEach(step => {
      const token = document.createElement('div');
      token.className = 'spacing-token';
      const barWidth = Math.min(step.value, 100);
      token.innerHTML = `
        <div class="spacing-visual">
          <div class="spacing-bar" style="width:${barWidth}%"></div>
        </div>
        <div class="spacing-value">${step.value}px</div>
        <div class="spacing-name">${step.name}</div>
      `;
      spacingEl.appendChild(token);
    });

    // Contrast matrix
    function luminance(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      const srgb = [r, g, b].map(v =>
        v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4)
      );
      return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
    }

    function contrastRatio(hex1, hex2) {
      const l1 = luminance(hex1);
      const l2 = luminance(hex2);
      const lighter = Math.max(l1, l2);
      const darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }

    const contrastEl = document.getElementById('contrast');
    // Header row
    const emptyCell = document.createElement('div');
    emptyCell.className = 'contrast-cell header';
    emptyCell.textContent = 'BG / FG';
    contrastEl.appendChild(emptyCell);

    const contrastColours = colours.filter(c => c.name !== 'Off-White');
    contrastColours.forEach(col => {
      const cell = document.createElement('div');
      cell.className = 'contrast-cell header';
      cell.textContent = col.name;
      contrastEl.appendChild(cell);
    });

    // Data rows
    contrastColours.forEach(bg => {
      const rowHeader = document.createElement('div');
      rowHeader.className = 'contrast-cell header';
      rowHeader.textContent = bg.name;
      contrastEl.appendChild(rowHeader);

      contrastColours.forEach(fg => {
        const cell = document.createElement('div');
        cell.className = 'contrast-cell';
        cell.style.background = bg.hex;
        cell.style.color = fg.hex;

        if (bg.hex === fg.hex) {
          cell.textContent = '--';
        } else {
          const ratio = contrastRatio(bg.hex, fg.hex);
          const passes = ratio >= 4.5;
          cell.innerHTML = `
            <span class="contrast-ratio">${ratio.toFixed(1)}:1</span>
            <span class="${passes ? 'pass' : 'fail'}">${passes ? 'AA' : 'Fail'}</span>
          `;
        }
        contrastEl.appendChild(cell);
      });
    });
  </script>
</body>
</html>
